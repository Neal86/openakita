services:
  openakita:
    build: .
    restart: unless-stopped
    expose:
      - "18900"
    volumes:
      - ./data:/app/data
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 18900
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18900/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - default

networks:
  default:
    driver: bridge
